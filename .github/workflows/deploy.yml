name: Deploy Fundetec a VPS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: deploy-produccion
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy en VPS
    runs-on: ubuntu-latest

    steps:
      - name: Conectar y desplegar en VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/fundetec-academy-lms

            echo ">>> Obteniendo cambios de GitHub..."
            git pull origin main

            echo ">>> Instalando dependencias..."
            npm install --production=false

            echo ">>> Limpiando lock de build anterior si existe..."
            rm -f .next/build-manifest.json.lock 2>/dev/null || true

            echo ">>> Construyendo aplicación..."
            npm run build

            echo ">>> Copiando archivos estáticos..."
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            echo ">>> Reiniciando servidor con PM2..."
            pm2 restart fundetec

            echo "Deploy completado exitosamente"
